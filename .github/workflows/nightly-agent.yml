name: Nightly agent
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Run nightly agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -c "from datetime import date; open('docs/last-run.txt','w').write(date.today().isoformat())"
      - name: Commit
        run: |
          git config user.name "vibe-check-cli-agent[bot]"
          git config user.email "C:\Users\jdsto"
          git add -A
          git diff --staged --quiet || git commit -m "chore(agent): nightly update $(date -u +%Y-%m-%d)"
          git push
